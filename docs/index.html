<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Tigo Business</title>
    <style>
        :root { --tigo-blue: #0033a0; --tigo-light: #0050ef; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 380px; 
            position: relative;
        }

        .logo { font-size: 28px; font-weight: bold; color: var(--tigo-blue); margin-bottom: 25px; text-align: center; }
        
        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: var(--tigo-blue); margin-bottom: 5px; }

        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
        }

        /* ESTA ES LA MAGIA: Lista flotante que no empuja el contenido */
        #lista-sugerencias {
            position: absolute;
            top: 70px; /* Justo debajo del input de búsqueda */
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 999; /* Por encima de todo */
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .sugerencia-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f7fafc;
            font-size: 14px;
        }

        .sugerencia-item:hover { background: #f0f4ff; color: var(--tigo-blue); }

        button { 
            width: 100%; 
            background: var(--tigo-blue); 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px;
        }

        .footer-tag { text-align: center; margin-top: 20px; font-size: 10px; color: #a0aec0; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Tigo Business</div>

    <div class="form-group">
        <label>BUSCAR COORDINADOR</label>
        <input type="text" id="buscador" placeholder="Escriba su nombre..." autocomplete="off" oninput="filtrar()">
        <div id="lista-sugerencias"></div>
        <input type="hidden" id="slug-seleccionado">
    </div>

    <div class="form-group">
        <label>PIN DE ACCESO</label>
        <input type="password" id="pass" placeholder="Clave de 8 dígitos">
    </div>

    <button onclick="acceder()">ENTRAR AL REPORTE</button>
    <div class="footer-tag">© 2026 Tigo Paraguay</div>
</div>

<script>

        "ferreira-acosta-arnaldo-alberto": "FERREIRA ACOSTA, ARNALDO ALBERTO",
        "benitez-octavio-herimarc": "BENITEZ, OCTAVIO HERIMARC",
        "leon-riquelme-aldo-javier": "LEÓN RIQUELME, ALDO JAVIER",
        "portillo-silvero-jessica-noemi": "PORTILLO SILVERO, JESSICA NOEMI",

        "gaona-bataglia-nicolas-ulises": "GAONA BATAGLIA, NICOLAS ULISES",
        "silvera-minella-maria-fernanda": "SILVERA MINELLA, Maria Fernanda",
        "ruiz-cuellar-carolina": "RUIZ CUELLAR, Carolina",
        "lopez-frutos-jose-maria": "LOPEZ FRUTOS, Jose Maria",
        "alvarez-caballero-fernando-rafael": "ALONSO CASARTELLI, FRANCO RAFAEL",
        "leguizamon-cuevas-diego-jose": "LEGUIZAMON CUEVAS, DIEGO JOSE"
    };

    function filtrar() {
        const input = document.getElementById('buscador');
        const lista = document.getElementById('lista-sugerencias');
        const filtro = input.value.toLowerCase();
        
        lista.innerHTML = "";
        if (filtro.length < 2) { lista.style.display = "none"; return; }

        let encontrados = 0;
        for (const [slug, nombre] of Object.entries(coordinadores)) {
            if (nombre.toLowerCase().includes(filtro)) {
                const item = document.createElement('div');
                item.className = 'sugerencia-item';
                item.textContent = nombre;
                item.onclick = function() {
                    input.value = nombre;
                    document.getElementById('slug-seleccionado').value = slug;
                    lista.style.display = "none";
                };
                lista.appendChild(item);
                encontrados++;
            }
        }
        lista.style.display = encontrados > 0 ? "block" : "none";
    }

    function acceder() {
        const slug = document.getElementById('slug-seleccionado').value;
        const pass = document.getElementById('pass').value;
        if (!slug || !pass) { alert("Seleccione nombre e ingrese PIN"); return; }
        
        // Redirigir a la carpeta docs que está en el mismo nivel
        window.location.href = "./docs/" + slug + "-" + pass + ".html";
    }

    // Cerrar lista si se toca fuera
    document.addEventListener('click', (e) => {
        if (e.target.id !== 'buscador') document.getElementById('lista-sugerencias').style.display = "none";
    });
</script>
</body>
</html>
