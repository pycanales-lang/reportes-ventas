<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Reportes | Tigo</title>
    <style>
        :root {
            --tigo-blue: #0033a0;
            --tigo-light: #0050ef;
            --accent: #00dce6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 35px;
            font-weight: 900;
            color: var(--tigo-blue);
            margin-bottom: 5px;
            letter-spacing: -1.5px;
        }

        .logo span { color: var(--tigo-accent); }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--tigo-blue);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 16px; /* Evita zoom molesto en móviles */
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--tigo-blue);
            background: #fdfdff;
            outline: none;
        }

        #coordinador {
            margin-top: -2px;
            border-top: none;
            border-radius: 0 0 12px 12px;
            background: #f8fafc;
            height: 150px;
        }

        #buscador {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: 1px dashed #cbd5e0;
        }

        button {
            width: 100%;
            background: var(--tigo-blue);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0, 51, 160, 0.2);
        }

        button:active { transform: translateY(2px); }

        .footer-tag {
            margin-top: 30px;
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Tigo<span>Business</span></div>
    <div class="subtitle">Dashboard de Gestión de Ventas</div>

    <div class="form-group">
        <label>Buscar Mi Nombre</label>
        <input type="text" id="buscador" placeholder="Escriba aquí..." onkeyup="filtrar()">
        <select id="coordinador" size="5"></select>
    </div>

    <div class="form-group">
        <label>Pin de Acceso</label>
        <input type="password" id="pass" placeholder="Clave de 8 dígitos">
    </div>

    <button onclick="acceder()">ENTRAR AL REPORTE</button>

    <div class="footer-tag">© 2026 Sistema de Notificaciones</div>
</div>

<script>
    // Tu objeto de coordinadores se mantiene igual aquí
    const coordinadores = {
        "vera-portillo-angel-javier": "VERA PORTILLO, ANGEL JAVIER",
        "arguello-maria-romina": "ARGUELLO, MARIA ROMINA",
        "romero-duarte-melissa-aylen": "ROMERO DUARTE, MELISSA AYLEN",
        // ... añadir el resto aquí
    };

    function cargarLista(filtro = "") {
        const select = document.getElementById('coordinador');
        select.innerHTML = "";
        Object.entries(coordinadores).forEach(([slug, nombre]) => {
            if (nombre.toLowerCase().includes(filtro.toLowerCase())) {
                const opt = document.createElement('option');
                opt.value = slug;
                opt.textContent = nombre;
                select.appendChild(opt);
            }
        });
    }

    function filtrar() {
        cargarLista(document.getElementById('buscador').value);
    }

    function acceder() {
        const user = document.getElementById('coordinador').value;
        const pass = document.getElementById('pass').value;
        if(!user || !pass) { alert("Seleccione su nombre e ingrese su clave"); return; }
        // Los archivos están dentro de la carpeta docs
        window.location.href = `./${user}-${pass}.html`;
    }

    cargarLista();
</script>
</body>
</html>
