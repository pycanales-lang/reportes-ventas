<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Tigo | Reportes</title>

<style>
:root {
    --tigo-blue:#0033a0;
    --tigo-light:#0050ef;
    --accent:#00dce6;
}

body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0033a0,#0050ef);
}

.login-card {
    background:white;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:24px;
    box-shadow:0 25px 40px rgba(0,0,0,0.25);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}

.logo {
    font-size:34px;
    font-weight:900;
    color:var(--tigo-blue);
}

.logo span { color:var(--accent); }

.subtitle {
    color:#718096;
    font-size:14px;
    margin-bottom:30px;
}

input, select {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:2px solid #edf2f7;
    margin-bottom:15px;
    font-size:15px;
}

input:focus {
    border-color:var(--tigo-blue);
    outline:none;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0033a0,#0050ef);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:scale(1.02);
}

.error {
    color:red;
    font-size:12px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="login-card">
    <div class="logo">Tigo<span>Business</span></div>
    <div class="subtitle">Acceso a Reportes</div>

    <input type="text" id="buscador" placeholder="Buscar nombre..." onkeyup="filtrar()">
    <select id="coordinador" size="5"></select>

    <input type="password" id="pass" placeholder="Ingrese su clave">

    <button onclick="login()">Ingresar</button>

    <div id="error" class="error"></div>
</div>

<script>
    // 1. El diccionario de coordinadores (Asegúrate de que los nombres coincidan con tus archivos .html)

        "espinola-rojajs-rebeca-maricel": "ESPINOLA ROJAS, REBECA MARICEL"
    };

    // 2. Función para cargar y filtrar la lista
    function filtrar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const select = document.getElementById('coordinador');
        
        // Limpiamos el select
        select.innerHTML = "";

        // Filtramos y añadimos opciones
        Object.entries(coordinadores).forEach(([slug, nombre]) => {
            if (nombre.toLowerCase().includes(busqueda)) {
                const opt = document.createElement('option');
                opt.value = slug;
                opt.textContent = nombre;
                select.appendChild(opt);
            }
        });
    }

    // 3. Función para entrar al reporte
    function acceder() {
        const user = document.getElementById('coordinador').value;
        const pass = document.getElementById('pass').value;
        
        if (!user || !pass) {
            alert("Por favor, seleccione su nombre e ingrese su PIN");
            return;
        }

        // Redirigir a la carpeta docs donde están los reportes
        window.location.href = "./docs/" + user + "-" + pass + ".html";
    }

    // 4. EJECUTAR AL CARGAR: Esto hace que la lista aparezca apenas abre la página
    window.onload = filtrar;
</script>
</body>
</html>
