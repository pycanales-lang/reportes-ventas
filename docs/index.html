<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Ventas | Tigo</title>
    <style>
        :root {
            --tigo-blue: #0033a0;
            --tigo-light: #0050ef;
            --accent: #00dce6;
            --text-dark: #1a202c;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 51, 160, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--tigo-blue);
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .logo span { color: var(--accent); }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
            position: relative;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--tigo-blue);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--tigo-blue);
            background: #fdfdff;
            outline: none;
        }

        /* Lista desplegable oculta que aparece al buscar */
        #lista-sugerencias {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none; /* Oculta por defecto */
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .sugerencia-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            border-bottom: 1px solid #f7fafc;
        }

        .sugerencia-item:hover {
            background-color: #f0f4ff;
            color: var(--tigo-blue);
        }

        button {
            width: 100%;
            background: var(--tigo-blue);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0, 51, 160, 0.2);
            transition: all 0.2s;
        }

        button:active { transform: translateY(2px); box-shadow: none; }

        .footer-tag {
            margin-top: 30px;
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Tigo<span>Business</span></div>
    <div class="subtitle">Gestión de Ventas</div>

    <div class="form-group">
        <label>Buscar Coordinador</label>
        <input type="text" id="buscador" placeholder="Escriba su nombre..." autocomplete="off" oninput="filtrar()">
        <div id="lista-sugerencias"></div>
        <input type="hidden" id="slug-seleccionado">
    </div>

    <div class="form-group">
        <label>PIN de Acceso</label>
        <input type="password" id="pass" placeholder="Clave de 8 dígitos">
    </div>

    <button onclick="acceder()">ENTRAR AL REPORTE</button>

    <div class="footer-tag">© 2026 Sistema de Notificaciones</div>
</div>

<script>

        "vera-portillo-angel-javier": "VERA PORTILLO, ANGEL JAVIER",

        "benitez-franco-rosana": "BENITEZ FRANCO, ROSANA",

        "noguera-garcia-laura-melissa": "NOGUERA GARCIA, Laura Melissa",

        "alderete-espinola-francisco-isaias": "ALDERETE ESPINOLA, Francisco Isaias",

        "acosta-cabrera-guzman": "ACOSTA CABRERA, GUZMAN",
        "lujan-ramirez-christian": "LUJAN RAMIREZ, Christian",
        "lopez-pacua-nelson-raul": "LOPEZ PACUA, NELSON RAUL",
        "acosta-rivaldi-milagro-estefania": "ACOSTA RIVALDI, MILAGRO ESTEFANIA",
        "gimenez-coronel-yohana-elizabeth": "GIMENEZ CORONEL, YOHANA ELIZABETH",
        "ferreira-acosta-arnaldo-alberto": "FERREIRA ACOSTA, ARNALDO ALBERTO",
        "benitez-octavio-herimarc": "BENITEZ, OCTAVIO HERIMARC",
        "leon-riquelme-aldo-javier": "LEÓN RIQUELME, ALDO JAVIER",
        "portillo-silvero-jessica-noemi": "PORTILLO SILVERO, JESSICA NOEMI",
        "grossling-aquino-yanio-mathias": "GROSSLING AQUINO, YANIO MATHIAS",
        "benitez-garcia-ever": "BENITEZ GARCIA, EVER",
        "espinoza-lopez-luis-rodrigo": "ESPINOZA LOPEZ, LUIS RODRIGO",

        "cabrera-lezcano-ismael-nebaiot": "CABRERA LEZCANO, Ismael Nebaiot",
        "gaona-bataglia-nicolas-ulises": "GAONA BATAGLIA, NICOLAS ULISES",
        "silvera-minella-maria-fernanda": "SILVERA MINELLA, Maria Fernanda",
        "ruiz-cuellar-carolina": "RUIZ CUELLAR, Carolina",
        "lopez-frutos-jose-maria": "LOPEZ FRUTOS, Jose Maria",
        "alvarez-caballero-fernando-rafael": "ALONSO CASARTELLI, FRANCO RAFAEL",
        "leguizamon-cuevas-diego-jose": "LEGUIZAMON CUEVAS, DIEGO JOSE"
    };

    function filtrar() {
        const input = document.getElementById('buscador');
        const lista = document.getElementById('lista-sugerencias');
        const filtro = input.value.toLowerCase();
        
        lista.innerHTML = "";
        
        if (filtro.length < 2) {
            lista.style.display = "none";
            return;
        }

        let encontrados = 0;
        for (const [slug, nombre] of Object.entries(coordinadores)) {
            if (nombre.toLowerCase().includes(filtro)) {
                const item = document.createElement('div');
                item.className = 'sugerencia-item';
                item.textContent = nombre;
                item.onclick = function() {
                    input.value = nombre;
                    document.getElementById('slug-seleccionado').value = slug;
                    lista.style.display = "none";
                };
                lista.appendChild(item);
                encontrados++;
            }
        }

        lista.style.display = encontrados > 0 ? "block" : "none";
    }

    function acceder() {
        const slug = document.getElementById('slug-seleccionado').value;
        const pass = document.getElementById('pass').value;
        
        if (!slug || !pass) {
            alert("Seleccione su nombre de la lista e ingrese su PIN.");
            return;
        }

        // Redirigir a la carpeta docs
        window.location.href = "./docs/" + slug + "-" + pass + ".html";
    }

    // Cerrar lista si se hace clic afuera
    document.addEventListener('click', function(e) {
        if (e.target.id !== 'buscador') {
            document.getElementById('lista-sugerencias').style.display = "none";
        }
    });
</script>

</body>
</html>
