<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Reportes | Tigo Business</title>
    <style>
        :root {
            --tigo-blue: #0033a0;
            --tigo-accent: #00dce6;
            --bg-gray: #f4f7fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 420px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 51, 160, 0.1);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .tigo-logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--tigo-blue);
            letter-spacing: -1.5px;
        }

        .tigo-logo span { color: var(--tigo-accent); }

        .subtitle {
            color: #5a6b87;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--tigo-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e8f0;
            border-radius: 12px;
            font-size: 16px; /* Evita zoom automático en iPhone */
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus { border-color: var(--tigo-blue); background: #fdfdff; }

        /* Estilo especial para la lista de sugerencias */
        #coordinador {
            margin-top: 5px;
            border-top: none;
            border-radius: 0 0 12px 12px;
            background: #f8fafc;
        }

        #buscador {
            border-radius: 12px 12px 0 0;
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--tigo-blue);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 51, 160, 0.2);
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.98); }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-container">
        <div class="tigo-logo">Tigo<span>Business</span></div>
        <div class="subtitle">Portal de Reportes Diarios</div>
    </div>

    <div class="input-group">
        <label>Seleccione su Nombre</label>
        <input type="text" id="buscador" placeholder="🔎 Buscar..." onkeyup="filtrar()">
        <select id="coordinador" size="4"></select>
    </div>

    <div class="input-group">
        <label>Contraseña Asignada</label>
        <input type="password" id="pass" placeholder="••••••••">
    </div>

    <button class="btn-primary" onclick="acceder()">VER REPORTE DIARIO</button>

    <div class="footer">
        © 2026 Tigo Paraguay<br>
        Acceso restringido para personal autorizado
    </div>
</div>

<script>
    const coordinadores = {
        "vera-portillo-angel-javier": "VERA PORTILLO, ANGEL JAVIER",
        "arguello-maria-romina": "ARGUELLO, MARIA ROMINA",
        // ... (agrega aquí el resto de tus coordinadores como los tenías)
        "leguizamon-cuevas-diego-jose": "LEGUIZAMON CUEVAS, DIEGO JOSE"
    };

    const select = document.getElementById('coordinador');

    function cargarLista(filtro = "") {
        select.innerHTML = "";
        const keys = Object.keys(coordinadores);
        for (const slug of keys) {
            const nombre = coordinadores[slug];
            if (nombre.toLowerCase().includes(filtro.toLowerCase())) {
                const opt = document.createElement('option');
                opt.value = slug;
                opt.innerHTML = nombre;
                opt.style.padding = "10px";
                select.appendChild(opt);
            }
        }
    }

    function filtrar() { cargarLista(document.getElementById('buscador').value); }

    function acceder() {
        const user = select.value;
        const pass = document.getElementById('pass').value;
        if (!user || !pass) { alert("Por favor, complete sus credenciales."); return; }
        window.location.href = `docs/${user}-${pass}.html`;
    }

    cargarLista();
</script>
</body>
</html>
