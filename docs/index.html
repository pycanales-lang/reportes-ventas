:root {

body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0033a0,#0050ef);
}

.login-card {
    background:white;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:24px;
    box-shadow:0 25px 40px rgba(0,0,0,0.25);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}

.logo {
    font-size:34px;
    font-weight:900;
    color:var(--tigo-blue);
}

.logo span { color:var(--accent); }

.subtitle {
    color:#718096;
    font-size:14px;
    margin-bottom:30px;
}

input, select {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:2px solid #edf2f7;
    margin-bottom:15px;
    font-size:15px;
}

input:focus {
    border-color:var(--tigo-blue);
    outline:none;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0033a0,#0050ef);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:scale(1.02);
}

.error {
    color:red;
    font-size:12px;
    margin-top:10px;
}

</style>
</head>

// 🔹 Cargar lista
function cargarLista(filtro="") {
    const select = document.getElementById("coordinador");
    select.innerHTML = "";

    Object.entries(coordinadores).forEach(([key, user]) => {
        //if(key === "admin") return;

        if(user.nombre.toLowerCase().includes(filtro.toLowerCase())){
            const opt = document.createElement("option");
            opt.value = key;
            opt.textContent = user.nombre;
            select.appendChild(opt);
        }
    });
}

// 🔹 Buscar
function filtrar(){
    cargarLista(document.getElementById("buscador").value);
}

// 🔐 LOGIN PRO
function login(){
    const userKey = document.getElementById("coordinador").value;
    const pass = document.getElementById("pass").value;
    const error = document.getElementById("error");

    error.textContent = "";

    // 👑 ADMIN ACCESS
    iif(pass === "Admin2026*"){
        window.location.href = "./admin.html";
        return;
    }

    // Validación normal
    if(!userKey || !pass){
        error.textContent = "Complete todos los campos";
        return;
    }

    const user = coordinadores[userKey];

    if(user && user.pass === pass){
        // acceso correcto
        window.location.href = `./docs/${userKey}.html`;
    } else {
        error.textContent = "Clave incorrecta";
    }
}
