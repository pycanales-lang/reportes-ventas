<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Ventas | Tigo</title>
    <style>
        :root {
            --tigo-blue: #0033a0;
            --tigo-light-blue: #0050ef;
            --bg-gray: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--tigo-blue);
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--tigo-light-blue);
        }

        button {
            width: 100%;
            background-color: var(--tigo-blue);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--tigo-light-blue);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #999;
        }

        /* Estilo para el buscador */
        .search-box {
            margin-bottom: 5px;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }
        select {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            border-top: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">Tigo Business</div>
    <div class="subtitle">Portal de Reportes para Coordinadores</div>

    <div class="form-group">
        <label>BUSCAR COORDINADOR</label>
        <input type="text" id="buscador" placeholder="Empiece a escribir su nombre..." onkeyup="filtrar()">
        <select id="coordinador" size="5">
            </select>
    </div>

    <div class="form-group">
        <label>CONTRASEÑA</label>
        <input type="password" id="pass" placeholder="Ingrese su clave asignada">
    </div>

    <button onclick="acceder()">VER REPORTE DIARIO</button>
    <div id="error" style="color:red; font-size: 12px; margin-top: 15px; display: none;">
        Acceso denegado. Verifique su usuario y contraseña.
    </div>

    <div class="footer-text">
        © 2026 Tigo Paraguay - Uso estrictamente interno
    </div>
</div>

<script>

        "ferreira-acosta-arnaldo-alberto": "FERREIRA ACOSTA, ARNALDO ALBERTO",
        "benitez-octavio-herimarc": "BENITEZ, OCTAVIO HERIMARC",
        "leon-riquelme-aldo-javier": "LEÓN RIQUELME, ALDO JAVIER",
        "portillo-silvero-jessica-noemi": "PORTILLO SILVERO, JESSICA NOEMI",

        "benitez-garcia-ever": "BENITEZ GARCIA, EVER",

        "cabrera-lezcano-ismael-nebaiot": "CABRERA LEZCANO, Ismael Nebaiot",
        "gaona-bataglia-nicolas-ulises": "GAONA BATAGLIA, NICOLAS ULISES",
        "silvera-minella-maria-fernanda": "SILVERA MINELLA, Maria Fernanda",
        "ruiz-cuellar-carolina": "RUIZ CUELLAR, Carolina",
        "lopez-frutos-jose-maria": "LOPEZ FRUTOS, Jose Maria",
        "alvarez-caballero-fernando-rafael": "ALONSO CASARTELLI, FRANCO RAFAEL",
        "leguizamon-cuevas-diego-jose": "LEGUIZAMON CUEVAS, DIEGO JOSE"
    };

    const select = document.getElementById('coordinador');

    // Cargar lista inicial
    function cargarLista(filtro = "") {
        select.innerHTML = "";
        for (const [slug, nombre] of Object.entries(coordinadores)) {
            if (nombre.toLowerCase().includes(filtro.toLowerCase())) {
                const opt = document.createElement('option');
                opt.value = slug;
                opt.innerHTML = nombre;
                select.appendChild(opt);
            }
        }
    }

    function filtrar() {
        const texto = document.getElementById('buscador').value;
        cargarLista(texto);
    }

    function acceder() {
        const user = select.value;
        const pass = document.getElementById('pass').value;
        
        if (!user) {
            alert("Por favor, seleccione su nombre de la lista.");
            return;
        }
        if (!pass) {
            alert("Por favor, ingrese su contraseña.");
            return;
        }

        // Construir URL: nombre-password.html
        const destino = user + "-" + pass + ".html";
        
        // Redirigir
        window.location.href = destino;
    }

    // Inicializar
    cargarLista();
</script>

</body>
</html>
