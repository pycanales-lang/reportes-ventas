<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Ventas | Tigo</title>
    <style>
        :root {
            --tigo-blue: #0033a0;
            --tigo-light: #0050ef;
            --bg-gray: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--tigo-blue);
            margin-bottom: 5px;
        }

        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; position: relative; }

        label { display: block; font-size: 11px; font-weight: 700; color: var(--tigo-blue); margin-bottom: 5px; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--tigo-blue); }

        /* LISTA DE SUGERENCIAS MEJORADA */
        #coordinador {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 0 0 10px 10px;
            display: none; /* OCULTO POR DEFECTO */
            position: absolute;
            z-index: 100;
            background: white;
            max-height: 150px;
            overflow-y: auto;
        }

        option { padding: 12px; border-bottom: 1px solid #f0f0f0; }

        button {
            width: 100%;
            background-color: var(--tigo-blue);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .footer-text { margin-top: 20px; font-size: 10px; color: #999; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">Tigo Business</div>
    <div class="subtitle">Portal de Reportes</div>

    <div class="form-group">
        <label>BUSCAR COORDINADOR</label>
        <input type="text" id="buscador" placeholder="Escriba su nombre..." oninput="filtrar()" autocomplete="off">
        <select id="coordinador" size="5" onclick="seleccionar()"></select>
    </div>

    <div class="form-group">
        <label>PIN DE ACCESO</label>
        <input type="password" id="pass" placeholder="Clave de 8 dígitos">
    </div>

    <button onclick="acceder()">ENTRAR AL REPORTE</button>
    <div class="footer-text">© 2026 Tigo Paraguay</div>
</div>

<script>

        "ferreira-acosta-arnaldo-alberto": "FERREIRA ACOSTA, ARNALDO ALBERTO",
        "benitez-octavio-herimarc": "BENITEZ, OCTAVIO HERIMARC",
        "leon-riquelme-aldo-javier": "LEÓN RIQUELME, ALDO JAVIER",
        "portillo-silvero-jessica-noemi": "PORTILLO SILVERO, JESSICA NOEMI",

        "ruiz-cuellar-carolina": "RUIZ CUELLAR, Carolina",
        "lopez-frutos-jose-maria": "LOPEZ FRUTOS, Jose Maria",
        "alvarez-caballero-fernando-rafael": "ALONSO CASARTELLI, FRANCO RAFAEL",
        "leguizamon-cuevas-diego-jose": "LEGUIZAMON CUEVAS, DIEGO JOSE"
    };

    function filtrar() {
        const input = document.getElementById('buscador');
        const select = document.getElementById('coordinador');
        const filtro = input.value.toLowerCase();
        
        select.innerHTML = "";
        
        if (filtro.length < 2) {
            select.style.display = "none";
            return;
        }

        let encontrados = 0;
        for (const [slug, nombre] of Object.entries(coordinadores)) {
            if (nombre.toLowerCase().includes(filtro)) {
                const opt = document.createElement('option');
                opt.value = slug;
                opt.innerHTML = nombre;
                select.appendChild(opt);
                encontrados++;
            }
        }
        select.style.display = encontrados > 0 ? "block" : "none";
    }

    function seleccionar() {
        const select = document.getElementById('coordinador');
        const input = document.getElementById('buscador');
        input.value = select.options[select.selectedIndex].text;
        input.dataset.slug = select.value;
        select.style.display = "none";
    }

    function acceder() {
        const slug = document.getElementById('buscador').dataset.slug;
        const pass = document.getElementById('pass').value;
        
        if (!slug || !pass) {
            alert("Por favor, seleccione su nombre de la lista e ingrese su PIN.");
            return;
        }

        // SOLUCIÓN AL ERROR 404:
        // Si el index.html está en la raíz y los reportes en /docs:
        window.location.href = "./docs/" + slug + "-" + pass + ".html";
        
        // Si el index.html ya está DENTRO de la carpeta /docs, usa esta:
        // window.location.href = "./" + slug + "-" + pass + ".html";
    }
</script>
</body>
</html>
