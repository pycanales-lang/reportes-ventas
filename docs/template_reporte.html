<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #0033a0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .title { color: #0033a0; font-size: 22px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 15px; border-radius: 8px; text-align: center; color: white; }
        .bg-blue { background: #0033a0; }
        .bg-green { background: #10b981; }
        .bg-red { background: #ef4444; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1f2937; color: white; padding: 10px; font-size: 13px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="title">REPORTE TIGO BUSINESS</div>
                <div style="font-size: 14px; color: #666;">Coordinador: <b>{{nombre_coordinador}}</b></div>
            </div>
            <div style="text-align: right; font-size: 12px; color: #999;">
                {{fecha_actual}}
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card bg-blue"><strong>{{total_vendedores}}</strong><br><small>VENDEDORES</small></div>
            <div class="stat-card bg-green"><strong>{{porcentaje_efectividad}}%</strong><br><small>EFECTIVIDAD</small></div>
            <div class="stat-card bg-red"><strong>{{sin_ventas}}</strong><br><small>SIN VENTAS</small></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>CH</th>
                    <th>Vendedor</th>
                    <th>Zona</th>
                    <th style="text-align:center;">Ventas</th>
                </tr>
            </thead>
            <tbody>
                {{filas_tabla}}
            </tbody>
        </table>
    </div>
</body>
</html>
